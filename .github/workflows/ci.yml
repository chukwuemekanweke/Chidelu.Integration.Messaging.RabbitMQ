name: CI (.NET 9)

on:
  push:
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "tests/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "tests/**"

jobs:
  test-unit:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore solution
        run: dotnet restore "Chidelu.Integration.Messaging.RabbitMQ.sln"

      - name: Build solution
        run: dotnet build "Chidelu.Integration.Messaging.RabbitMQ.sln" --configuration Release --no-restore

      - name: Run Unit Tests with Coverage
        shell: bash
        run: |
          # Discover all unit test projects dynamically (case-insensitive)
          mapfile -t TEST_PROJECTS < <(find tests -type f -iname "*Tests.Unit.csproj")
          
          if [ ${#TEST_PROJECTS[@]} -eq 0 ]; then
            echo "❌ No unit test projects found matching pattern '*Tests.Unit.csproj'."
            exit 1
          fi

          echo "🧪 Found ${#TEST_PROJECTS[@]} test project(s):"
          printf '%s\n' "${TEST_PROJECTS[@]}"

          # Run all discovered test projects sequentially
          for proj in "${TEST_PROJECTS[@]}"; do
            echo "▶️ Running tests for: $proj"
            dotnet test "$proj" \
              --configuration Release \
              --no-build \
              --logger "trx;LogFileName=$(basename "$proj" .csproj)-results.trx" \
              --collect "XPlat Code Coverage"
          done

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate Coverage Report
        shell: bash
        run: |
          COVERAGE_FILES=$(find . -type f -name "coverage.cobertura.xml")
          if [ -z "$COVERAGE_FILES" ]; then
            echo "⚠️ No coverage files found."
            exit 1
          fi
          
          echo "📊 Generating combined HTML coverage report..."
          ~/.dotnet/tools/reportgenerator \
            -reports:$COVERAGE_FILES \
            -targetdir:CoverageReport \
            -reporttypes:HtmlSummary;Cobertura

          mkdir -p CoverageRaw
          for f in $COVERAGE_FILES; do
            cp "$f" "CoverageRaw/$(basename "$(dirname "$f")")-coverage.cobertura.xml"
          done

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: "**/*.trx"

      - name: Upload Coverage (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: CoverageReport

      - name: Upload Coverage (Cobertura XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cobertura
          path: CoverageRaw
