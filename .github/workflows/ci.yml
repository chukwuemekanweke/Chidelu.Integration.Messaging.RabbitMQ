name: CI (.NET 10)

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "tests/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "tests/**"
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore solution
        run: dotnet restore "Chidelu.Integration.Messaging.RabbitMQ.sln"

      - name: Build solution (Release)
        run: dotnet build "Chidelu.Integration.Messaging.RabbitMQ.sln" --configuration Release --no-restore

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          if-no-files-found: warn
          path: |
            src/**/bin/Release/**
            tests/**/bin/Release/**

  test-unit:
    needs: build
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Restore solution
        run: dotnet restore "Chidelu.Integration.Messaging.RabbitMQ.sln"

      - name: Make test assemblies executable
        shell: bash
        run: find tests -path "*/bin/*" -type f -exec chmod +x {} \;

      - name: Run Unit Tests with Coverage (auto-discover *Tests.Unit.csproj)
        id: unit_tests
        shell: bash
        run: |
          RESULTS_ROOT="TestResultsAll"
          rm -rf "$RESULTS_ROOT"
          mkdir -p "$RESULTS_ROOT"

          mapfile -t TEST_PROJECTS < <(find tests -type f -iname "*Tests.Unit.csproj")
          if [ ${#TEST_PROJECTS[@]} -eq 0 ]; then
            echo "❌ No unit test projects found matching '*Tests.Unit.csproj'."
            exit 1
          fi

          echo "🧪 Found ${#TEST_PROJECTS[@]} project(s):"
          printf '%s\n' "${TEST_PROJECTS[@]}"

          for proj in "${TEST_PROJECTS[@]}"; do
            NAME=$(basename "$proj" .csproj)
            OUTDIR="$RESULTS_ROOT/$NAME"
            mkdir -p "$OUTDIR"
            echo "▶️ dotnet test $proj → $OUTDIR"
            dotnet test "$proj" \
              --configuration Release \
              --no-build \
              --results-directory "$OUTDIR" \
              --logger "trx;LogFileName=$NAME-results.trx" \
              --collect "XPlat Code Coverage"
          done

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: "**/*.trx"

      - name: Upload Unit Coverage (Cobertura XML)
        if: ${{ steps.unit_tests.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-raw
          path: "TestResultsAll/**/coverage.cobertura.xml"

  test-integration:
    needs: build
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Restore solution
        run: dotnet restore "Chidelu.Integration.Messaging.RabbitMQ.sln"

      - name: Make test assemblies executable
        shell: bash
        run: find tests -path "*/bin/*" -type f -exec chmod +x {} \;

      - name: Run Integration Tests with Coverage
        id: integration_tests
        shell: bash
        run: |
          RESULTS_ROOT="TestResultsIntegration"
          rm -rf "$RESULTS_ROOT"
          mkdir -p "$RESULTS_ROOT"

          dotnet test "tests/integration/Chidelu.Integration.Messaging.RabbitMQ.IntegrationTests/Chidelu.Integration.Messaging.RabbitMQ.IntegrationTests.csproj" \
            --configuration Release \
            --no-build \
            --results-directory "$RESULTS_ROOT" \
            --logger "trx;LogFileName=integration-results.trx" \
            --collect "XPlat Code Coverage"

      - name: Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: "TestResultsIntegration/**/*.trx"

      - name: Upload Integration Coverage (Cobertura XML)
        if: ${{ steps.integration_tests.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration-raw
          path: "TestResultsIntegration/**/coverage.cobertura.xml"

  coverage-report:
    needs: [test-unit, test-integration]
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Unit Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit-raw
          path: CoverageRaw/unit

      - name: Download Integration Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration-raw
          path: CoverageRaw/integration

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate Coverage Report
        shell: bash
        run: |
          COVERAGE_FILES=$(find CoverageRaw -type f -name "coverage.cobertura.xml")
          if [ -z "$COVERAGE_FILES" ]; then
            echo "No coverage files found under CoverageRaw."
            find CoverageRaw -type f -print || true
            exit 1
          fi

          echo "Generating combined HTML + Cobertura coverage report..."
          REPORTS=$(echo "$COVERAGE_FILES" | tr '\n' ';' | sed 's/;*$//')
          ~/.dotnet/tools/reportgenerator \
            -reports:"$REPORTS" \
            -targetdir:"CoverageReport" \
            -reporttypes:"HtmlSummary;Cobertura"

      - name: Upload Coverage (HTML)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: CoverageReport

      - name: Upload Coverage (Cobertura XML)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cobertura
          path: CoverageReport/Cobertura.xml

  publish-nuget:
    needs: [test-unit, test-integration]
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'release' }}
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version from tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG=$(git tag --points-at HEAD | head -n 1)
          fi

          if [ -z "$TAG" ]; then
            echo "No tag found on HEAD. Skipping NuGet publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="${TAG#v}"
          if [ -z "$VERSION" ]; then
            echo "Resolved empty version from tag: $TAG"
            exit 1
          fi

          echo "Using version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Restore solution
        if: ${{ steps.version.outputs.publish == 'true' }}
        run: dotnet restore "Chidelu.Integration.Messaging.RabbitMQ.sln"

      - name: Pack NuGet packages
        if: ${{ steps.version.outputs.publish == 'true' }}
        run: |
          dotnet pack "src/Chidelu.Integration.Messaging.RabbitMQ.Core/Chidelu.Integration.Messaging.RabbitMQ.Core.csproj" --configuration Release --no-restore --output artifacts/nuget -p:Version=${{ steps.version.outputs.version }}
          dotnet pack "src/Chidelu.Integration.Messaging.RabbitMQ.Publisher/Chidelu.Integration.Messaging.RabbitMQ.Publisher.csproj" --configuration Release --no-restore --output artifacts/nuget -p:Version=${{ steps.version.outputs.version }}
          dotnet pack "src/Chidelu.Integration.Messaging.RabbitMQ.Consumer/Chidelu.Integration.Messaging.RabbitMQ.Consumer.csproj" --configuration Release --no-restore --output artifacts/nuget -p:Version=${{ steps.version.outputs.version }}

      - name: Publish to NuGet
        if: ${{ steps.version.outputs.publish == 'true' }}
        run: dotnet nuget push "artifacts/nuget/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
